name: CI

on:
  pull_request:
  push:
    branches: ["master", "main"]

jobs:
  syntax-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Compile tracked Python files
        run: |
          git ls-files '*.py' | xargs -r python -m py_compile
